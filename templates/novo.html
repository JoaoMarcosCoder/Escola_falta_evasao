<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Aluno</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f5f5f5; }
        h1   { color: #333; }

        .formulario {
            background: white; border: 1px solid #ccc;
            padding: 20px; max-width: 460px; border-radius: 6px;
        }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input[type="text"], input[type="number"] {
            width: 100%; padding: 8px; margin-top: 4px;
            box-sizing: border-box; border: 1px solid #ccc;
            border-radius: 4px; font-size: 15px;
        }
        .linha-check { display: flex; align-items: center; gap: 8px; margin-top: 12px; }

        .grade-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 8px; margin-top: 8px;
        }
        .grade-grid input { text-align: center; }

        input[type="submit"] {
            margin-top: 20px; padding: 10px 20px;
            background: #2ecc71; color: white;
            border: none; border-radius: 4px;
            font-size: 16px; cursor: pointer;
        }
        a { color: #3498db; }
    </style>
</head>
<body>

<h1>➕ Cadastrar Novo Aluno</h1>

<div class="formulario">
    <form method="POST" action="/novo">

        <label>Nome do aluno:</label>
        <input type="text" name="nome" required>

        <label>Frequência (%):</label>
        <input type="number" name="frequencia" min="0" max="100" step="0.1" required>

        <label>Ocorrências disciplinares:</label>
        <input type="number" name="ocorrencias" min="0" value="0" required>

        <div class="linha-check">
            <input type="checkbox" name="baixa_renda" id="baixa_renda">
            <label for="baixa_renda" style="margin:0; font-weight:normal">Família de baixa renda</label>
        </div>
        <div class="linha-check">
            <input type="checkbox" name="trabalha" id="trabalha">
            <label for="trabalha" style="margin:0; font-weight:normal">Aluno trabalha</label>
        </div>

        <label>Notas do bimestre (deixe vazio se faltou):</label>
        <div class="grade-grid">
            <input type="number" name="nota1" min="0" max="10" step="0.1" placeholder="Nota 1">
            <input type="number" name="nota2" min="0" max="10" step="0.1" placeholder="Nota 2">
            <input type="number" name="nota3" min="0" max="10" step="0.1" placeholder="Nota 3">
            <input type="number" name="nota4" min="0" max="10" step="0.1" placeholder="Nota 4">
            <input type="number" name="nota5" min="0" max="10" step="0.1" placeholder="Nota 5">
            <input type="number" name="nota6" min="0" max="10" step="0.1" placeholder="Nota 6">
        </div>

        <input type="submit" value="Cadastrar Aluno">
    </form>
</div>

<br>
<a href="/">← Voltar para a lista</a>

</body>
</html>
