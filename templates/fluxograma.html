<!-- ════════════════════════════════
     FLUXOGRAMA 2 — NOTAS (PBL 3)
════════════════════════════════ -->
<h2>Algoritmo 2 — Análise de Notas</h2>
<p>Usa: <b>for, range, break, continue</b></p>

<div style="overflow-x:auto">
  <svg viewBox="0 0 800 780" xmlns="http://www.w3.org/2000/svg"
       style="width:100%;max-width:800px;display:block;margin:0 auto;
              font-family:Arial,sans-serif;font-size:13px">
    <defs>
      <marker id="s2"  markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#555"/></marker>
      <marker id="s2v" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#e74c3c"/></marker>
      <marker id="s2g" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto"><polygon points="0 0,9 3,0 6" fill="#27ae60"/></marker>
    </defs>

    <!-- INÍCIO -->
    <ellipse cx="400" cy="35" rx="110" ry="22" fill="#333"/>
    <text x="400" y="40" text-anchor="middle" fill="white" font-weight="bold">INÍCIO — analisar_notas(notas)</text>
    <line x1="400" y1="57" x2="400" y2="83" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>

    <!-- PASSO 1 -->
    <rect x="210" y="87" width="380" height="44" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
    <text x="400" y="105" text-anchor="middle" fill="#1a252f" font-weight="bold">PASSO 1 — for nota in notas</text>
    <text x="400" y="121" text-anchor="middle" fill="#555">Percorre cada nota para calcular a média real</text>
    <line x1="400" y1="131" x2="400" y2="157" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>

    <!-- if nota == 0 -->
    <polygon points="400,161 530,196 400,231 270,196" fill="#fef9e7" stroke="#d4ac0d" stroke-width="1.5"/>
    <text x="400" y="189" text-anchor="middle">nota == 0 ?</text>
    <text x="400" y="206" text-anchor="middle">(é falta?)</text>
    <!-- SIM → continue -->
    <line x1="530" y1="196" x2="640" y2="196" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#s2v)"/>
    <text x="582" y="188" text-anchor="middle" fill="#e74c3c" font-weight="bold">SIM</text>
    <rect x="640" y="176" width="130" height="40" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="705" y="192" text-anchor="middle" fill="#922b21" font-weight="bold">continue</text>
    <text x="705" y="208" text-anchor="middle" fill="#922b21" font-size="11">pula para a próxima</text>
    <!-- NÃO → soma -->
    <line x1="400" y1="231" x2="400" y2="255" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>
    <text x="388" y="247" text-anchor="end" fill="#555">NÃO</text>
    <rect x="260" y="259" width="280" height="36" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
    <text x="400" y="281" text-anchor="middle" fill="#1e8449">soma += nota  |  validas += 1</text>
    <line x1="400" y1="295" x2="400" y2="319" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>

    <!-- PASSO 2 -->
    <rect x="220" y="323" width="360" height="44" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
    <text x="400" y="341" text-anchor="middle" fill="#1a252f" font-weight="bold">PASSO 2 — for i in range(len(notas))</text>
    <text x="400" y="357" text-anchor="middle" fill="#555">for j in range(i+1) → loop dentro de loop</text>
    <text x="400" y="370" text-anchor="middle" fill="#555" font-size="11">Calcula médias progressivas a cada nota válida</text>
    <line x1="400" y1="379" x2="400" y2="403" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>

    <!-- PASSO 3 -->
    <rect x="210" y="407" width="380" height="44" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
    <text x="400" y="425" text-anchor="middle" fill="#1a252f" font-weight="bold">PASSO 3 — for i in range(1, len(notas_validas))</text>
    <text x="400" y="441" text-anchor="middle" fill="#555">Percorre notas válidas contando quedas seguidas</text>
    <line x1="400" y1="451" x2="400" y2="475" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>

    <!-- if caiu -->
    <polygon points="400,479 548,514 400,549 252,514" fill="#fef9e7" stroke="#d4ac0d" stroke-width="1.5"/>
    <text x="400" y="507" text-anchor="middle">notas[i] &lt; notas[i-1] ?</text>
    <text x="400" y="524" text-anchor="middle">(nota caiu?)</text>
    <!-- SIM → conta -->
    <line x1="548" y1="514" x2="640" y2="514" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>
    <text x="591" y="506" text-anchor="middle" fill="#555" font-weight="bold">SIM</text>
    <rect x="640" y="494" width="140" height="40" rx="6" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
    <text x="710" y="518" text-anchor="middle" fill="#4a235a">quedas_seguidas += 1</text>
    <line x1="710" y1="534" x2="710" y2="558" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>
    <!-- if >= 3 -->
    <polygon points="710,562 790,587 710,612 630,587" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="710" y="580" text-anchor="middle" fill="#922b21">quedas</text>
    <text x="710" y="597" text-anchor="middle" fill="#922b21">&gt;= 3?</text>
    <line x1="790" y1="587" x2="790" y2="640" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#s2v)"/>
    <text x="797" y="617" fill="#e74c3c" font-weight="bold">SIM</text>
    <rect x="730" y="640" width="120" height="40" rx="6" fill="#fadbd8" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="790" y="658" text-anchor="middle" fill="#922b21" font-weight="bold">break 🚨</text>
    <text x="790" y="673" text-anchor="middle" fill="#922b21" font-size="11">para o loop</text>
    <!-- NÃO (não caiu) -->
    <line x1="252" y1="514" x2="170" y2="514" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>
    <text x="209" y="506" text-anchor="middle" fill="#555" font-weight="bold">NÃO</text>
    <rect x="20" y="494" width="150" height="40" rx="6" fill="#d5f5e3" stroke="#27ae60" stroke-width="1.5"/>
    <text x="95" y="512" text-anchor="middle" fill="#1e8449">quedas_seguidas = 0</text>
    <text x="95" y="528" text-anchor="middle" fill="#1e8449" font-size="11">(reinicia contagem)</text>

    <!-- PASSO 4 -->
    <line x1="400" y1="549" x2="400" y2="673" stroke="#555" stroke-width="1" stroke-dasharray="5,3"/>
    <rect x="240" y="677" width="320" height="44" rx="6" fill="#eaf4fb" stroke="#2980b9" stroke-width="1.5"/>
    <text x="400" y="695" text-anchor="middle" fill="#1a252f" font-weight="bold">PASSO 4 — if / elif / else</text>
    <text x="400" y="711" text-anchor="middle" fill="#555">Compara primeira e última nota válida</text>
    <line x1="400" y1="721" x2="400" y2="743" stroke="#555" stroke-width="1.5" marker-end="url(#s2)"/>

    <rect x="260" y="747" width="280" height="26" rx="4" fill="#f0f0f0" stroke="#aaa"/>
    <text x="400" y="764" text-anchor="middle" fill="#333">⬆️ MELHORANDO  ➡️ ESTÁVEL  ⬇️ PIORANDO</text>
  </svg>
